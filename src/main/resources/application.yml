spring:
  application:
    name: artinus_be_assignment

  datasource:
    url: jdbc:h2:mem:artinus;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create          # 앱 시작 시 스키마 생성 (테스트/과제용)
    defer-datasource-initialization: true   # 스키마 생성 후 data.sql 실행되도록
    properties:
      hibernate:
        format_sql: true
    show-sql: true              # 실행 SQL 로그 (개발 중 확인용)

  sql:
    init:
      mode: always              # data.sql 항상 실행
      encoding: UTF-8           # data.sql의 한글(채널명)이 플랫폼 기본 인코딩(CP949)으로 깨지지 않도록

csrng:
  base-url: https://csrng.net     # 외부 난수 API host (장애 시뮬레이션 시 override)

springdoc:
  swagger-ui:
    path: /swagger-ui.html        # UI 진입점 (/swagger-ui/index.html 로 리다이렉트)
    operations-sorter: method
    tags-sorter: alpha
  default-produces-media-type: application/json

claude:                           # top-level (이전엔 spring 하위에 잘못 중첩되어 있었음)
  api-key: ${CLAUDE_API_KEY:}     # 환경변수로 주입 — 저장소에 커밋 금지
  model: claude-sonnet-5          # 최신 Sonnet (docs.anthropic.com 기준)
  base-url: https://api.anthropic.com
  max-tokens: 1024                # 요약 한 문단이면 충분

resilience4j:
  circuitbreaker:
    instances:
      csrng:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        record-exceptions:
          - io.github.ingkoon.artinus.common.client.csrng.exception.ExternalApiUnavailableException
        ignore-exceptions:
          - io.github.ingkoon.artinus.common.client.csrng.exception.ExternalApiFailedException
  retry:
    instances:
      csrng:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - io.github.ingkoon.artinus.common.client.csrng.exception.ExternalApiUnavailableException
        ignore-exceptions:
          - io.github.ingkoon.artinus.common.client.csrng.exception.ExternalApiFailedException